<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>Bezier Easing Rust WASM Demo</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at 15% 15%, rgba(34, 197, 94, 0.22), transparent 26rem),
          radial-gradient(circle at 78% 8%, rgba(59, 130, 246, 0.24), transparent 24rem),
          linear-gradient(135deg, #020617, #111827 55%, #18181b);
        color: #f8fafc;
      }

      main {
        width: min(100% - 2rem, 1180px);
        margin: 0 auto;
        padding: clamp(2rem, 6vw, 5rem) 0;
      }

      h1 {
        max-width: 980px;
        margin: 0;
        font-size: clamp(2.5rem, 7vw, 6rem);
        letter-spacing: -0.075em;
        line-height: 0.9;
      }

      p {
        max-width: 70ch;
        margin: 1rem 0 2rem;
        color: #cbd5e1;
        font-size: 1.02rem;
        line-height: 1.7;
      }

      .panel {
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 28px;
        background: rgba(15, 23, 42, 0.76);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
      }

      canvas {
        display: block;
        width: 100%;
        height: auto;
      }

      .legend {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 0.75rem;
        margin-top: 1rem;
      }

      .legend-item {
        display: grid;
        gap: 0.35rem;
        min-width: 0;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.06);
        padding: 0.85rem 1rem;
      }

      .label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-weight: 700;
      }

      .swatch {
        width: 0.75rem;
        height: 0.75rem;
        flex: 0 0 auto;
        border-radius: 999px;
      }

      code {
        overflow: hidden;
        color: #cbd5e1;
        font-size: 0.84rem;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Rust Bezier Easing, sampled through WASM</h1>
      <p>
        This demo expands the upstream canvas example into several common easing
        presets. Each curve and animation lane uses the Rust implementation via
        WebAssembly, not a JavaScript easing implementation.
      </p>
      <section class="panel" aria-label="Bezier easing curves and animation lanes">
        <canvas id="viewport" width="1180" height="720"></canvas>
      </section>
      <div id="legend" class="legend" aria-label="Easing presets"></div>
    </main>

    <script type="module">
      import init, { WasmBezierEasing } from "./pkg/bezier_easing_wasm_demo.js";

      const presets = [
        { name: "Linear", args: [0, 0, 1, 1], color: "#94a3b8" },
        { name: "CSS ease", args: [0.25, 0.1, 0.25, 1], color: "#22c55e" },
        { name: "Ease in", args: [0.42, 0, 1, 1], color: "#38bdf8" },
        { name: "Ease out", args: [0, 0, 0.58, 1], color: "#f97316" },
        { name: "Ease in-out", args: [0.42, 0, 0.58, 1], color: "#a78bfa" },
        { name: "Upstream demo", args: [0.25, 0.1, 0, 1], color: "#f43f5e" },
      ];

      const canvas = document.getElementById("viewport");
      const ctx = canvas.getContext("2d");
      const legend = document.getElementById("legend");
      const duration = 2400;

      await init();

      const easings = presets.map((preset) => ({
        ...preset,
        easing: new WasmBezierEasing(...preset.args),
      }));

      legend.innerHTML = easings
        .map(
          ({ name, args, color }) => `
            <div class="legend-item">
              <span class="label"><span class="swatch" style="background:${color}"></span>${name}</span>
              <code>bezier_easing(${args.join(", ")})</code>
            </div>
          `,
        )
        .join("");

      function drawGrid(left, top, width, height) {
        ctx.strokeStyle = "rgba(148, 163, 184, 0.22)";
        ctx.lineWidth = 1;
        for (let i = 0; i <= 4; i += 1) {
          const x = left + (width * i) / 4;
          const y = top + (height * i) / 4;
          ctx.beginPath();
          ctx.moveTo(x, top);
          ctx.lineTo(x, top + height);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(left, y);
          ctx.lineTo(left + width, y);
          ctx.stroke();
        }
      }

      function drawCurves(activeProgress) {
        const left = 78;
        const top = 54;
        const size = 300;
        drawGrid(left, top, size, size);

        ctx.strokeStyle = "rgba(248, 250, 252, 0.78)";
        ctx.lineWidth = 2;
        ctx.strokeRect(left, top, size, size);

        for (const preset of easings) {
          ctx.strokeStyle = preset.color;
          ctx.lineWidth = preset.name === "Upstream demo" ? 4 : 2.5;
          ctx.beginPath();
          for (let i = 0; i <= 120; i += 1) {
            const x = i / 120;
            const y = preset.easing.sample(x);
            const px = left + x * size;
            const py = top + size - y * size;
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
          }
          ctx.stroke();
        }

        const markerX = left + activeProgress * size;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.72)";
        ctx.setLineDash([8, 8]);
        ctx.beginPath();
        ctx.moveTo(markerX, top);
        ctx.lineTo(markerX, top + size);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.fillStyle = "#f8fafc";
        ctx.font = "700 22px Inter, sans-serif";
        ctx.fillText("Curve samples", left, top + size + 42);
        ctx.font = "14px Inter, sans-serif";
        ctx.fillStyle = "#cbd5e1";
        ctx.fillText("x input progresses left to right; y output rises bottom to top", left, top + size + 66);
      }

      function drawAnimationLanes(rawProgress) {
        const left = 500;
        const right = canvas.width - 90;
        const startY = 86;
        const rowGap = 86;
        const trackWidth = right - left;

        for (const [index, preset] of easings.entries()) {
          const eased = preset.easing.sample(rawProgress);
          const y = startY + index * rowGap;
          const x = left + eased * trackWidth;

          ctx.fillStyle = "rgba(148, 163, 184, 0.16)";
          ctx.fillRect(left, y + 8, trackWidth, 10);

          ctx.fillStyle = preset.color;
          ctx.fillRect(left, y + 8, eased * trackWidth, 10);

          const height = 32 + eased * 42;
          ctx.fillStyle = preset.color;
          ctx.fillRect(x - 22, y - height / 2 + 12, 44, height);

          ctx.fillStyle = "#f8fafc";
          ctx.font = "700 18px Inter, sans-serif";
          ctx.fillText(preset.name, left, y - 18);
          ctx.fillStyle = "#94a3b8";
          ctx.font = "13px ui-monospace, SFMono-Regular, Menlo, monospace";
          ctx.fillText(`p=${eased.toFixed(3)}`, right - 76, y - 18);
        }
      }

      function draw(now) {
        const phase = (now % duration) / duration;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawCurves(phase);
        drawAnimationLanes(phase);
        requestAnimationFrame(draw);
      }

      requestAnimationFrame(draw);
    </script>
  </body>
</html>
