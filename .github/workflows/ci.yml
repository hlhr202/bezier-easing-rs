name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy -p bezier_easing --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test -p bezier_easing --all-features

      - name: Check WASM demo crate
        run: cargo check -p bezier_easing_wasm_demo

      - name: Verify package
        run: cargo package -p bezier_easing
